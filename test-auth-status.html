<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>认证状态检查</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .status { padding: 10px; margin: 10px 0; border-radius: 5px; }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .warning { background-color: #fff3cd; color: #856404; border: 1px solid #ffeaa7; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .info { background-color: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        button { padding: 10px 20px; margin: 10px 5px; cursor: pointer; }
        .token-display { word-break: break-all; font-family: monospace; font-size: 12px; }
    </style>
</head>
<body>
    <h1>认证状态检查工具</h1>
    <div id="status"></div>
    <div id="token-info"></div>
    
    <h2>操作</h2>
    <button onclick="checkAuthStatus()">刷新检查</button>
    <button onclick="clearTokens()">清除所有Token</button>
    <button onclick="testLogin()">测试登录</button>
    <button onclick="testReportAPI()">测试报表API</button>
    
    <script>
        function checkAuthStatus() {
            const statusDiv = document.getElementById('status');
            const tokenInfoDiv = document.getElementById('token-info');
            
            // 检查localStorage
            const localAccessToken = localStorage.getItem('access_token');
            const localRefreshToken = localStorage.getItem('refresh_token');
            const rememberMe = localStorage.getItem('remember_me');
            
            // 检查sessionStorage
            const sessionAccessToken = sessionStorage.getItem('access_token');
            const sessionRefreshToken = sessionStorage.getItem('refresh_token');
            
            let statusHtml = '';
            let tokenInfoHtml = '';
            
            if (localAccessToken || sessionAccessToken) {
                statusHtml = '<div class="status success">✅ 用户已登录 - 找到访问令牌</div>';
                
                tokenInfoHtml = '<h3>Token信息:</h3>';
                 tokenInfoHtml += `<div class="info"><strong>Remember Me:</strong> ${rememberMe || 'false'}</div>`;
                 if (localAccessToken) {
                     tokenInfoHtml += `<div class="info"><strong>localStorage access_token:</strong><br><div class="token-display">${localAccessToken}</div></div>`;
                 }
                 if (localRefreshToken) {
                     tokenInfoHtml += `<div class="info"><strong>localStorage refresh_token:</strong><br><div class="token-display">${localRefreshToken}</div></div>`;
                 }
                 if (sessionAccessToken) {
                     tokenInfoHtml += `<div class="info"><strong>sessionStorage access_token:</strong><br><div class="token-display">${sessionAccessToken}</div></div>`;
                 }
                 if (sessionRefreshToken) {
                     tokenInfoHtml += `<div class="info"><strong>sessionStorage refresh_token:</strong><br><div class="token-display">${sessionRefreshToken}</div></div>`;
                 }
            } else {
                statusHtml = '<div class="status error">❌ 用户未登录 - 未找到访问令牌</div>';
                statusHtml += '<div class="status warning">请先在前端应用中登录（用户名: admin, 密码: 123456）</div>';
            }
            
            statusDiv.innerHTML = statusHtml;
            tokenInfoDiv.innerHTML = tokenInfoHtml;
        }
        
        function clearTokens() {
            localStorage.removeItem('access_token');
            localStorage.removeItem('refresh_token');
            sessionStorage.removeItem('access_token');
            sessionStorage.removeItem('refresh_token');
            alert('所有Token已清除');
            checkAuthStatus();
        }
        
        async function testLogin() {
            try {
                const response = await fetch('http://localhost:10000/api/v1/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: 'admin',
                        password: '123456'
                    })
                });
                
                const data = await response.json();
                
                if (data.code === '00000') {
                    alert('登录测试成功！Token: ' + data.data.accessToken.substring(0, 50) + '...');
                } else {
                    alert('登录测试失败: ' + data.msg);
                }
            } catch (error) {
                alert('登录测试错误: ' + error.message);
            }
        }
        
        async function testReportAPI() {
            const accessToken = localStorage.getItem('access_token') || sessionStorage.getItem('access_token');
            
            if (!accessToken) {
                alert('未找到访问令牌，请先登录');
                return;
            }
            
            try {
                const response = await fetch('http://localhost:10000/api/v1/reports/today-overview', {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${accessToken}`
                    }
                });
                
                const data = await response.json();
                
                if (data.code === '00000') {
                    alert('报表API测试成功！数据: ' + JSON.stringify(data.data));
                } else {
                    alert('报表API测试失败: ' + data.msg);
                }
            } catch (error) {
                alert('报表API测试错误: ' + error.message);
            }
        }
        
        // 页面加载时自动检查
        window.onload = function() {
            checkAuthStatus();
        };
    </script>
</body>
</html>
